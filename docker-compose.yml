version: "3.8"
services:
  agent:
    build: .
    ports:
      - "${WEBHOOK_PORT:-8443}:${WEBHOOK_PORT:-8443}"
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - LLM_PROVIDER=${LLM_PROVIDER:-openrouter}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - OPENROUTER_MODEL=${OPENROUTER_MODEL:-openai/gpt-4o}
      - STT_PROVIDER=${STT_PROVIDER:-openai}
      - TTS_PROVIDER=${TTS_PROVIDER:-openai}
      - PLANNER_ENABLED=${PLANNER_ENABLED:-true}
      - PLANNER_MAX_REPLAN_ATTEMPTS=${PLANNER_MAX_REPLAN_ATTEMPTS:-1}
      - WEBHOOK_ENABLED=${WEBHOOK_ENABLED:-false}
      - WEBHOOK_URL=${WEBHOOK_URL}
      - WEBHOOK_PORT=${WEBHOOK_PORT:-8443}
      - RATE_LIMIT_ENABLED=${RATE_LIMIT_ENABLED:-true}
      - DAILY_COST_LIMIT=${DAILY_COST_LIMIT:-2.00}
    volumes:
      - agent_data:/app/data
    restart: unless-stopped

volumes:
  agent_data:
